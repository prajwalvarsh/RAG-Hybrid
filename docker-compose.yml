services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Persist the ChromaDB index across container restarts.
      - ./chroma_db:/app/chroma_db
      # Persist source documents so the API can ingest from disk.
      - ./data/raw:/app/data/raw
    env_file: .env
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

  streamlit:
    build: .
    ports:
      - "8501:8501"
    depends_on:
      - api
    env_file: .env
    # Override BASE_URL so the UI talks to the 'api' service by its Docker
    # Compose service name rather than localhost (which would be the container
    # itself, not the FastAPI container).
    environment:
      - BASE_URL=http://api:8000
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
